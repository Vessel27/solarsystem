<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Simulation - Realistic Spheres</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="view-3D data-open controls-open">

    <div id="navbar">
        <a id="toggle-data">Data</a>
        <h1>SOLAR SYSTEM</h1>
        <a id="toggle-controls">Controls</a>
    </div>

    <div id="data">
        <a class="sun" data-planet="sun">Sun</a>
        <a class="mercury" data-planet="mercury">Mercury</a>
        <a class="venus" data-planet="venus">Venus</a>
        <a class="earth active" data-planet="earth">Earth</a>
        <a class="mars" data-planet="mars">Mars</a>
        <a class="jupiter" data-planet="jupiter">Jupiter</a>
        <a class="saturn" data-planet="saturn">Saturn</a>
        <a class="uranus" data-planet="uranus">Uranus</a>
        <a class="neptune" data-planet="neptune">Neptune</a>
    </div>

    <div id="controls">
        <label><input type="radio" name="scale" value="stretched" checked> Stretched Scale</label>
        <label><input type="radio" name="scale" value="size"> Realistic Size</label>
        <div class="control-group">
            <label for="speed-slider">Speed: <span id="speed-label">1x</span></label>
            <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1">
        </div>
        <button id="toggle-pause">⏸ Pause</button>
    </div>

    <div id="universe">
        <canvas id="stars"></canvas>
        <div id="galaxy">
            <div id="solar-system">
                <div id="sun" data-planet="sun"></div>

                <div id="mercury" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="mercury"></div>
                    </div>
                </div>

                <div id="venus" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="venus"></div>
                    </div>
                </div>

                <div id="earth" class="orbit">
                    <div class="pos">
                        <div class="orbit">
                            <div class="pos"><div class="moon"></div></div>
                        </div>
                        <div class="planet" data-planet="earth"></div>
                    </div>
                </div>

                <div id="mars" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="mars"></div>
                    </div>
                </div>

                <div id="asteroids-belt"></div>

                <div id="jupiter" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="jupiter"></div>
                    </div>
                </div>

                <div id="saturn" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="saturn">
                            <div class="ring"></div>
                        </div>
                    </div>
                </div>

                <div id="uranus" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="uranus"></div>
                    </div>
                </div>

                <div id="neptune" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="neptune"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay"></div>
    <div id="planet-modal">
        <h2 id="modal-title">Planet Name</h2>
        <p id="modal-desc">Description goes here.</p>
        <div class="stats">
            <div><span>Diameter:</span> <span id="stat-diameter">-</span></div>
            <div><span>Distance:</span> <span id="stat-distance">-</span></div>
            <div><span>Orbit:</span> <span id="stat-orbit">-</span></div>
        </div>
        <button id="close-modal">Close</button>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="script.js"></script>
</body>
</html>
