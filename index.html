<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System Simulation - Realistic Spheres</title>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Open+Sans:400,300);
        
        /* Reset and Base Styles */
        html, body, div, span, h1, h2, h3, h4, h5, h6, p, a, dl, dt, dd, ol, ul, li, label, section {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
            box-sizing: border-box;
        }

        body {
            font-size: 10px;
            font-family: 'Open Sans', sans-serif;
            font-weight: 300;
            background-color: #08090A;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Navbar */
        #navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            transition: transform 0.5s ease;
        }

        .hide-UI #navbar { transform: translateY(-100%); }

        #navbar h1 {
            font-size: 1.8em;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #navbar h1 span {
            font-size: 0.5em;
            display: block;
            opacity: 0.7;
        }

        #navbar a {
            color: #40bad5;
            text-decoration: none;
            font-size: 1.2em;
            cursor: pointer;
        }

        /* Data Panel */
        #data {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 1000;
            transition: transform 0.5s ease;
        }

        .data-close #data { transform: translateX(-150%); }

        #data a {
            display: block;
            padding: 10px 15px;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
            cursor: pointer;
        }

        #data a:hover, #data a.active {
            background: #40bad5;
        }

        /* Controls Panel */
        #controls {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.5s ease;
        }

        .controls-close #controls { transform: translateX(150%); }

        #controls label {
            display: block;
            margin-bottom: 15px;
            cursor: pointer;
        }

        #controls input[type="radio"], #controls input[type="checkbox"] {
            margin-right: 10px;
        }

        /* Universe and Galaxy */
        #universe {
            z-index: 1;
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        /* Starfield Background */
        #stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 0;
        }

        #galaxy {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
        }

        #solar-system {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 2s ease-in-out;
            transform: rotateX(75deg);
        }

        /* Orbits */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform-style: preserve-3d;
            animation: orbit linear infinite;
        }

        .pos {
            position: absolute;
            top: 50%;
            width: 2em;
            height: 2em;
            margin-top: -1em;
            margin-left: -1em;
            transform-style: preserve-3d;
            animation: invert linear infinite;
        }

        /* Planets and Sun */
        #sun, .planet {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1em;
            height: 1em;
            margin-top: -0.5em;
            margin-left: -0.5em;
            border-radius: 50%;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        /* 3D Sphere Effect */
        #sun, .planet {
            background-color: #202020;
            background-size: cover;
            transition: transform 0.2s;
            /* Create 3D sphere look with radial gradient */
            box-shadow: inset -4px -4px 10px rgba(0,0,0,0.5), inset 4px 4px 10px rgba(255,255,255,0.2);
        }

        #sun {
            background: radial-gradient(circle at 30% 30%, #ffcc33, #FB7209);
            box-shadow: 0 0 60px rgba(255, 160, 60, 0.6), inset -10px -10px 20px rgba(0,0,0,0.3);
            font-size: 5em;
            transform: rotateX(-75deg);
        }

        .planet:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5), inset -4px -4px 10px rgba(0,0,0,0.5), inset 4px 4px 10px rgba(255,255,255,0.2);
        }

        /* Saturn's Ring */
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            width: 2.5em;
            height: 2.5em;
            margin-top: -1.25em;
            margin-left: -1.25em;
            border: 0.3em solid rgba(160, 147, 130, 0.4);
            transform: rotateX(90deg);
            pointer-events: none;
        }

        /* Moon */
        #earth .orbit {
            width: 6em;
            height: 6em;
            margin-top: -3em;
            margin-left: -3em;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .moon {
            width: 0.8em;
            height: 0.8em;
            background: radial-gradient(circle at 30% 30%, #eee, #888);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -0.4em;
            margin-left: -0.4em;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.5);
        }

        /* Asteroid Belt */
        #asteroids-belt {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50em;
            height: 50em;
            margin-top: -25em;
            margin-left: -25em;
            border-radius: 50%;
            transform-style: preserve-3d;
            animation: orbit 50s linear infinite;
        }

        .asteroid {
            position: absolute;
            border-radius: 50%;
            /* Enhanced 3D sphere effect using multiple shadows */
            box-shadow: 
                inset -2px -2px 4px rgba(0,0,0,0.8), 
                inset 1px 1px 2px rgba(255,255,255,0.3),
                0 0 4px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            /* Counter-rotate to face camera and maintain 3D appearance */
            animation: invert-asteroid linear infinite;
            animation-duration: inherit;
        }
        .asteroid.small { width: 3px; height: 3px; }
        .asteroid.medium { width: 6px; height: 6px; }
        .asteroid.big { width: 10px; height: 10px; }

        /* Modal Styles */
        #planet-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid #40bad5;
            border-radius: 12px;
            padding: 25px;
            z-index: 2000;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 10px rgba(64, 186, 213, 0.3);
            color: white;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1999;
        }

        #planet-modal h2 {
            font-size: 2.4em;
            margin-bottom: 15px;
            color: #40bad5;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(64, 186, 213, 0.3);
            padding-bottom: 10px;
        }

        #planet-modal p {
            font-size: 1.4em;
            line-height: 1.6;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        #planet-modal .stats {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #planet-modal .stats div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 1.2em;
        }

        #planet-modal .stats span:first-child {
            color: #40bad5;
            font-weight: bold;
        }

        #close-modal {
            background: #40bad5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2em;
            width: 100%;
            transition: background 0.3s;
        }

        #close-modal:hover {
            background: #35a0b8;
        }

        /* Animations */
        @keyframes orbit {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(-360deg); }
        }

        @keyframes invert {
            0% { transform: rotateX(-75deg) rotateY(360deg); }
            100% { transform: rotateX(-75deg) rotateY(0deg); }
        }

        /* Specific inversion for asteroids to handle their rotation and tilt */
        @keyframes invert-asteroid {
            0% { transform: translateZ(var(--z-offset)) rotateX(-75deg) rotateY(360deg); }
            100% { transform: translateZ(var(--z-offset)) rotateX(-75deg) rotateY(0deg); }
        }

        /* Planet Specific Styles with 3D gradients */
        #mercury .pos { animation-duration: 5s; }
        #mercury .planet { 
            font-size: 1.2em; 
            background: radial-gradient(circle at 30% 30%, #A5A5A5, #444); 
        }

        #venus.orbit { width: 22em; height: 22em; margin-top: -11em; margin-left: -11em; animation-duration: 8s; }
        #venus .pos { animation-duration: 8s; }
        #venus .planet { 
            font-size: 1.8em; 
            background: radial-gradient(circle at 30% 30%, #E3BB76, #8a6b3d); 
        }

        #earth.orbit { width: 32em; height: 32em; margin-top: -16em; margin-left: -16em; animation-duration: 12s; }
        #earth .pos { animation-duration: 12s; }
        #earth .planet { 
            font-size: 2em; 
            background: radial-gradient(circle at 30% 30%, #2271B3, #0d2c46); 
        }

        #mars.orbit { width: 42em; height: 42em; margin-top: -21em; margin-left: -21em; animation-duration: 20s; }
        #mars .pos { animation-duration: 20s; }
        #mars .planet { 
            font-size: 1.5em; 
            background: radial-gradient(circle at 30% 30%, #E27B58, #7c3a24); 
        }

        #jupiter.orbit { width: 65em; height: 65em; margin-top: -32.5em; margin-left: -32.5em; animation-duration: 40s; }
        #jupiter .pos { animation-duration: 40s; }
        #jupiter .planet { 
            font-size: 4.5em; 
            background: radial-gradient(circle at 30% 30%, #D39C7E, #6e4a36); 
        }

        #saturn.orbit { width: 90em; height: 90em; margin-top: -45em; margin-left: -45em; animation-duration: 60s; }
        #saturn .pos { animation-duration: 60s; }
        #saturn .planet { 
            font-size: 3.8em; 
            background: radial-gradient(circle at 30% 30%, #C5AB6E, #6d5d36); 
        }

        #uranus.orbit { width: 110em; height: 110em; margin-top: -55em; margin-left: -55em; animation-duration: 100s; }
        #uranus .pos { animation-duration: 100s; }
        #uranus .planet { 
            font-size: 2.5em; 
            background: radial-gradient(circle at 30% 30%, #B5E3E3, #5a7a7a); 
        }

        #neptune.orbit { width: 130em; height: 130em; margin-top: -65em; margin-left: -65em; animation-duration: 150s; }
        #neptune .pos { animation-duration: 150s; }
        #neptune .planet { 
            font-size: 2.4em; 
            background: radial-gradient(circle at 30% 30%, #175E9E, #0a2d4d); 
        }

        /* Scale Modes */
        .scale-size #mercury .planet { font-size: 0.5em; }
        .scale-size #venus .planet { font-size: 1.2em; }
        .scale-size #earth .planet { font-size: 1.3em; }
        .scale-size #mars .planet { font-size: 0.7em; }
        .scale-size #jupiter .planet { font-size: 14em; }
        .scale-size #saturn .planet { font-size: 12em; }
        .scale-size #uranus .planet { font-size: 5em; }
        .scale-size #neptune .planet { font-size: 4.9em; }

    </style>
</head>
<body class="view-3D data-open controls-open">

    <div id="navbar">
        <a id="toggle-data">Data</a>
        <h1>3D Solar System<span>Realistic 3D Spheres</span></h1>
        <a id="toggle-controls">Controls</a>
    </div>

    <div id="data">
        <a class="sun" data-planet="sun">Sun</a>
        <a class="mercury" data-planet="mercury">Mercury</a>
        <a class="venus" data-planet="venus">Venus</a>
        <a class="earth active" data-planet="earth">Earth</a>
        <a class="mars" data-planet="mars">Mars</a>
        <a class="jupiter" data-planet="jupiter">Jupiter</a>
        <a class="saturn" data-planet="saturn">Saturn</a>
        <a class="uranus" data-planet="uranus">Uranus</a>
        <a class="neptune" data-planet="neptune">Neptune</a>
    </div>

    <div id="controls">
        <label><input type="radio" name="scale" value="stretched" checked> Stretched Scale</label>
        <label><input type="radio" name="scale" value="size"> Realistic Size</label>
    </div>

    <div id="universe">
        <canvas id="stars"></canvas>
        <div id="galaxy">
            <div id="solar-system">
                <div id="sun" data-planet="sun"></div>

                <div id="mercury" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="mercury"></div>
                    </div>
                </div>

                <div id="venus" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="venus"></div>
                    </div>
                </div>

                <div id="earth" class="orbit">
                    <div class="pos">
                        <div class="orbit">
                            <div class="pos"><div class="moon"></div></div>
                        </div>
                        <div class="planet" data-planet="earth"></div>
                    </div>
                </div>

                <div id="mars" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="mars"></div>
                    </div>
                </div>

                <div id="asteroids-belt"></div>

                <div id="jupiter" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="jupiter"></div>
                    </div>
                </div>

                <div id="saturn" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="saturn">
                            <div class="ring"></div>
                        </div>
                    </div>
                </div>

                <div id="uranus" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="uranus"></div>
                    </div>
                </div>

                <div id="neptune" class="orbit">
                    <div class="pos">
                        <div class="planet" data-planet="neptune"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay"></div>
    <div id="planet-modal">
        <h2 id="modal-title">Planet Name</h2>
        <p id="modal-desc">Description goes here.</p>
        <div class="stats">
            <div><span>Diameter:</span> <span id="stat-diameter">-</span></div>
            <div><span>Distance:</span> <span id="stat-distance">-</span></div>
            <div><span>Orbit:</span> <span id="stat-orbit">-</span></div>
        </div>
        <button id="close-modal">Close</button>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            const body = $("body");
            const solarsys = $("#solar-system");

            const planetData = {
                sun: {
                    title: "The Sun",
                    desc: "The Sun is the star at the center of the Solar System. It is a nearly perfect sphere of hot plasma, heated to incandescence by nuclear fusion reactions in its core.",
                    diameter: "1,392,700 km",
                    distance: "0 km",
                    orbit: "N/A"
                },
                mercury: {
                    title: "Mercury",
                    desc: "Mercury is the smallest planet in the Solar System and the closest to the Sun. Its orbit around the Sun takes 87.97 Earth days, the shortest of all the Sun's planets.",
                    diameter: "4,879 km",
                    distance: "57.9 million km",
                    orbit: "88 days"
                },
                venus: {
                    title: "Venus",
                    desc: "Venus is the second planet from the Sun. It is sometimes called Earth's 'sister' or 'twin' planet as it is almost as large and has a similar composition.",
                    diameter: "12,104 km",
                    distance: "108.2 million km",
                    orbit: "225 days"
                },
                earth: {
                    title: "Earth",
                    desc: "Earth is the third planet from the Sun and the only astronomical object known to harbor life. About 29.2% of Earth's surface is land consisting of continents and islands.",
                    diameter: "12,742 km",
                    distance: "149.6 million km",
                    orbit: "365.25 days"
                },
                mars: {
                    title: "Mars",
                    desc: "Mars is the fourth planet from the Sun and the second-smallest planet in the Solar System, being larger than only Mercury. It is often referred to as the 'Red Planet'.",
                    diameter: "6,779 km",
                    distance: "227.9 million km",
                    orbit: "687 days"
                },
                jupiter: {
                    title: "Jupiter",
                    desc: "Jupiter is the fifth planet from the Sun and the largest in the Solar System. It is a gas giant with a mass more than two and a half times that of all the other planets in the Solar System combined.",
                    diameter: "139,820 km",
                    distance: "778.5 million km",
                    orbit: "11.86 years"
                },
                saturn: {
                    title: "Saturn",
                    desc: "Saturn is the sixth planet from the Sun and the second-largest in the Solar System, after Jupiter. It is a gas giant with an average radius of about nine and a half times that of Earth.",
                    diameter: "116,460 km",
                    distance: "1.434 billion km",
                    orbit: "29.45 years"
                },
                uranus: {
                    title: "Uranus",
                    desc: "Uranus is the seventh planet from the Sun. Its name is a reference to the Greek god of the sky, Uranus, who, according to Greek mythology, was the great-grandfather of Ares, grandfather of Zeus and father of Cronus.",
                    diameter: "50,724 km",
                    distance: "2.871 billion km",
                    orbit: "84 years"
                },
                neptune: {
                    title: "Neptune",
                    desc: "Neptune is the eighth and farthest-known Solar planet from the Sun. In the Solar System, it is the fourth-largest planet by diameter, the third-most-massive planet, and the densest giant planet.",
                    diameter: "49,244 km",
                    distance: "4.495 billion km",
                    orbit: "164.8 years"
                }
            };

            // Modal Logic
            function showModal(planetKey) {
                const data = planetData[planetKey];
                if (!data) return;

                $("#modal-title").text(data.title);
                $("#modal-desc").text(data.desc);
                $("#stat-diameter").text(data.diameter);
                $("#stat-distance").text(data.distance);
                $("#stat-orbit").text(data.orbit);

                $("#modal-overlay").fadeIn(300);
                $("#planet-modal").fadeIn(300);
            }

            function hideModal() {
                $("#modal-overlay").fadeOut(300);
                $("#planet-modal").fadeOut(300);
            }

            // Click events for planets and sun
            $(".planet, #sun").on("click", function() {
                const planetKey = $(this).data("planet");
                showModal(planetKey);
            });

            // Click events for side menu
            $("#data a").on("click", function(e) {
                e.preventDefault();
                const planetKey = $(this).data("planet");
                $("#data a").removeClass("active");
                $(this).addClass("active");
                showModal(planetKey);
            });

            $("#close-modal, #modal-overlay").on("click", hideModal);

            // Generate Stars
            const canvas = document.getElementById('stars');
            const ctx = canvas.getContext('2d');
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const stars = [];
            for(let i = 0; i < 400; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    opacity: Math.random()
                });
            }

            function drawStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(drawStars);
            }
            drawStars();

            // Generate Asteroids
            const belt = $("#asteroids-belt");
            const asteroidCount = 400; // Increased count for better visibility
            for(let i = 0; i < asteroidCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 23 + Math.random() * 4; // Wider belt
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                // Vertical spread for 3D effect
                const z = (Math.random() - 0.5) * 4; // Spread of 4em vertically
                
                // Randomly assign size class
                let sizeClass = 'small';
                const rand = Math.random();
                if (rand > 0.9) sizeClass = 'big';
                else if (rand > 0.6) sizeClass = 'medium';
                
                const asteroid = $(`<div class="asteroid ${sizeClass}"></div>`);
                const baseColor = 70 + Math.random() * 50;
                asteroid.css({
                    left: `calc(50% + ${x}em)`,
                    top: `calc(50% + ${y}em)`,
                    opacity: 0.8 + Math.random() * 0.2,
                    background: `radial-gradient(circle at 35% 35%, rgb(${baseColor+60}, ${baseColor+60}, ${baseColor+60}), rgb(${baseColor}, ${baseColor}, ${baseColor}) 70%, rgb(${baseColor-20}, ${baseColor-20}, ${baseColor-20}))`,
                    '--z-offset': `${z}em` // Pass vertical offset to CSS variable
                });
                belt.append(asteroid);
            }

            // Toggle Panels
            $("#toggle-data").on("click", function() {
                body.toggleClass("data-open data-close");
            });

            $("#toggle-controls").on("click", function() {
                body.toggleClass("controls-open controls-close");
            });

            // Scale Toggle
            $('input[name="scale"]').on("change", function() {
                if (this.value === "size") {
                    solarsys.addClass("scale-size");
                } else {
                    solarsys.removeClass("scale-size");
                }
            });

            // Initial UI delay
            setTimeout(() => {
                body.removeClass("hide-UI");
            }, 1000);
        });
    </script>
</body>
</html>
